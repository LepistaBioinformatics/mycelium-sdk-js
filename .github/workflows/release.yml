name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write # required for npm trusted publishing (OIDC)

jobs:
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "yarn"

      - run: npm install -g npm@latest # ensure npm >=11.5.1 for OIDC trusted publishing
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - run: yarn test --run
      - run: yarn lint

      - name: Version bump, changelog, tag, and GitHub release
        id: semantic
        uses: cycjimmy/semantic-release-action@c4a2fa890676fc2db25ad0aacd8ab4a0f1f4c024 # v4.2.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm via trusted publishing (OIDC, no token needed)
        if: steps.semantic.outputs.new_release_published == 'true'
        run: npm publish --access public

  # One-off manual publish for the CURRENT package.json version, bypassing
  # semantic-release's commit-analysis. Useful to republish/retry without
  # waiting for a new feat/fix/BREAKING CHANGE commit to land.
  manual-publish:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "yarn"

      - run: npm install -g npm@latest # ensure npm >=11.5.1 for OIDC trusted publishing
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - run: yarn test --run
      - run: yarn lint

      - name: Publish current package.json version to npm via trusted publishing
        run: npm publish --access public
