name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"

      - run: yarn install --frozen-lockfile
      - run: yarn typecheck
      - run: yarn test --run
      - run: yarn lint
      - run: yarn build
